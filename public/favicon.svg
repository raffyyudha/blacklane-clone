<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium gold gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a7a4c" />
      <stop offset="30%" stop-color="#c5a880" />
      <stop offset="50%" stop-color="#e6d5b8" />
      <stop offset="70%" stop-color="#c5a880" />
      <stop offset="100%" stop-color="#9a7a4c" />
    </linearGradient>
  </defs>
  <!-- Background: Smooth rounded square, dark charcoal -->
  <rect width="512" height="512" rx="128" fill="#1e1c1a" />
  <!-- Border: Subtle thin gold border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#gold-grad)" stroke-width="8" opacity="0.4" />
  
  <!-- Stylized Luxury "A" Monogram -->
  <g transform="translate(256, 265) scale(1.6)">
    <!-- Elegant serif A path -->
    <path d="M-40,60 L-15,-55 C-12,-65 -5,-70 5,-70 C15,-70 22,-65 25,-55 L50,60 C52,68 46,75 38,75 C32,75 28,70 27,62 L20,25 L-20,25 L-27,62 C-28,70 -32,75 -38,75 C-46,75 -52,68 -50,60 Z M-16,10 L16,10 L0,-45 Z" fill="url(#gold-grad)" />
    <!-- Small elegant diamond/dot accent above the A -->
    <path d="M0,-95 L8,-87 L0,-79 L-8,-87 Z" fill="url(#gold-grad)" />
  </g>
</svg>
